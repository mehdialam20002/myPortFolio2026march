backend:
  name: github
  repo: mehdialam20002/myPortFolio2026march
  branch: main
  base_url: https://mehdiiialam.netlify.app
  auth_endpoint: /.netlify/functions/oauth

# Lets you run the CMS locally with `npx decap-server` + /admin during dev.
local_backend: true

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

site_url: https://mehdiiialam.netlify.app
display_url: https://mehdiiialam.netlify.app

collections:
  - name: hero
    label: "1 · Hero"
    files:
      - name: hero
        label: Hero Section
        file: src/content/hero.json
        fields:
          - { name: available, label: "Availability badge", widget: string }
          - { name: location, label: "Location", widget: string }
          - { name: titleLine1, label: "Title line 1", widget: string }
          - { name: titleLine2, label: "Title line 2 (outlined)", widget: string }
          - { name: taglineBefore, label: "Tagline — start", widget: string }
          - { name: taglineHighlight, label: "Tagline — highlighted words", widget: string }
          - { name: taglineAfter, label: "Tagline — end", widget: string }
          - { name: nameLabel, label: "Name label", widget: string }
          - { name: name, label: "Your name", widget: string }
          - { name: scrollLabel, label: "Scroll cue text", widget: string }
          - { name: stack, label: "Bottom stack line", widget: string }
          - { name: year, label: "Year", widget: string }

  - name: about
    label: "2 · About"
    files:
      - name: about
        label: About Section
        file: src/content/about.json
        fields:
          - { name: eyebrow, label: "Eyebrow", widget: string }
          - { name: title, label: "Title", widget: string }
          - { name: bodyBefore, label: "Body — start", widget: text }
          - { name: bodyHighlight, label: "Body — highlighted words", widget: string }
          - { name: bodyAfter, label: "Body — end", widget: text }
          - name: stats
            label: Stats
            widget: list
            fields:
              - { name: value, label: Value, widget: string }
              - { name: label, label: Label, widget: string }

  - name: whatido
    label: "3 · What I Do"
    files:
      - name: whatido
        label: What I Do
        file: src/content/whatido.json
        fields:
          - name: cards
            label: Cards
            widget: list
            fields:
              - { name: title, label: Title, widget: string }
              - { name: subtitle, label: Subtitle, widget: string }
              - { name: description, label: Description, widget: text }
              - { name: skillsLabel, label: "Skills label", widget: string }
              - { name: tags, label: Tags, widget: list, field: { name: tag, label: Tag, widget: string } }

  - name: career
    label: "4 · Career"
    files:
      - name: career
        label: Career
        file: src/content/career.json
        fields:
          - { name: eyebrow, label: Eyebrow, widget: string }
          - { name: headingLine1, label: "Heading line 1", widget: string }
          - { name: headingLine2, label: "Heading line 2", widget: string }
          - name: jobs
            label: Jobs
            widget: list
            fields:
              - { name: role, label: Role, widget: string }
              - { name: company, label: Company, widget: string }
              - { name: place, label: "Stack · Location", widget: string }
              - { name: period, label: Period, widget: string }
              - { name: description, label: Description, widget: text }

  - name: projects
    label: "5 · Projects"
    files:
      - name: projects
        label: Projects
        file: src/content/projects.json
        fields:
          - { name: eyebrow, label: Eyebrow, widget: string }
          - { name: heading, label: Heading, widget: string }
          - name: items
            label: Projects
            widget: list
            fields:
              - { name: title, label: Title, widget: string }
              - { name: category, label: Category, widget: string }
              - { name: tools, label: Tools, widget: string }
              - { name: year, label: Year, widget: string }
              - { name: image, label: Preview image, widget: image, required: false }
              - { name: link, label: Live link, widget: string }

  - name: skills
    label: "6 · Skills"
    files:
      - name: skills
        label: Skills
        file: src/content/skills.json
        fields:
          - { name: eyebrow, label: Eyebrow, widget: string }
          - { name: headingBefore, label: "Heading — start", widget: string }
          - { name: headingHighlight, label: "Heading — highlight", widget: string }
          - { name: headingAfter, label: "Heading — end", widget: string }
          - name: groups
            label: Skill groups
            widget: list
            fields:
              - { name: id, label: "Number (e.g. 01)", widget: string }
              - { name: title, label: Title, widget: string }
              - { name: items, label: Items, widget: list, field: { name: item, label: Item, widget: string } }

  - name: credentials
    label: "7 · Credentials"
    files:
      - name: credentials
        label: Credentials
        file: src/content/credentials.json
        fields:
          - { name: eyebrow, label: Eyebrow, widget: string }
          - { name: headingBefore, label: "Heading — start", widget: string }
          - { name: headingHighlight, label: "Heading — highlight", widget: string }
          - { name: headingAfter, label: "Heading — end", widget: string }
          - name: columns
            label: Columns
            widget: list
            fields:
              - { name: title, label: "Column title", widget: string }
              - name: items
                label: Items
                widget: list
                fields:
                  - { name: name, label: Name, widget: string }
                  - { name: org, label: Organisation, widget: string }
                  - { name: sub, label: Sub-text, widget: string }

  - name: contact
    label: "8 · Contact"
    files:
      - name: contact
        label: Contact
        file: src/content/contact.json
        fields:
          - { name: eyebrow, label: Eyebrow, widget: string }
          - { name: ctaLine1, label: "CTA line 1", widget: string }
          - { name: ctaLine2, label: "CTA line 2", widget: string }
          - { name: ctaHighlight, label: "CTA highlight", widget: string }
          - { name: email, label: Email, widget: string }
          - { name: phone, label: "Phone (display)", widget: string }
          - { name: phoneHref, label: "Phone link (tel:)", widget: string }
          - { name: location, label: Location, widget: string }
          - { name: signature, label: Signature name, widget: string }
          - { name: year, label: Year, widget: string }
          - name: socials
            label: Social links
            widget: list
            fields:
              - { name: label, label: Label, widget: string }
              - { name: href, label: URL, widget: string }

  - name: site
    label: "9 · Nav & Marquees"
    files:
      - name: site
        label: Site / Nav
        file: src/content/site.json
        fields:
          - { name: navTitle, label: "Nav title", widget: string }
          - { name: navEmail, label: "Nav email", widget: string }
          - name: navLinks
            label: Nav links
            widget: list
            fields:
              - { name: label, label: Label, widget: string }
              - { name: href, label: "Anchor (e.g. #about)", widget: string }
          - { name: marqueeWords, label: "Marquee words", widget: list, field: { name: word, label: Word, widget: string } }
          - { name: techHeadingBefore, label: "Tech heading — start", widget: string }
          - { name: techHeadingHighlight, label: "Tech heading — highlight", widget: string }
          - { name: techWords, label: "Tech words (row 2)", widget: list, field: { name: word, label: Word, widget: string } }

  - name: ai
    label: "10 · AI Assistant"
    files:
      - name: ai
        label: AI Assistant
        file: src/content/ai.json
        fields:
          - { name: title, label: "Panel title", widget: string }
          - { name: subtitle, label: "Panel subtitle", widget: string }
          - { name: fabLabel, label: "Button label", widget: string }
          - { name: greeting, label: "Greeting message", widget: text }
          - { name: placeholder, label: "Input placeholder", widget: string }
          - { name: suggestions, label: "Suggested questions", widget: list, field: { name: q, label: Question, widget: string } }
          - { name: instructions, label: "AI behaviour / persona", widget: text }
          - { name: knowledge, label: "AI knowledge (facts about you)", widget: text }
